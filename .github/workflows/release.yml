name: Release

on:
  push:
    tags:
      - 'v*'

# Repo default was "read" — job-level permissions alone cannot grant write.
# This must match Settings → Actions → Workflow permissions (now read-write).
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          # Pin so setup-bun's internal cache key stays stable across runs.
          bun-version: "1.3.14"

      - uses: dtolnay/rust-toolchain@stable

      # Primary key includes Cargo.lock hash — bumps invalidate the exact key.
      # shared-key keeps a fallback cache across releases so tag builds stay fast.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-windows
          cache-workspace-crates: true
          cache-bin: true

      - name: Cache frontend dependencies
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: Beauy Smash Flash v__VERSION__
          releaseBody: |
            LAN arena shooter build for Windows.

            **Install:** run the `.exe` setup installer.

            **LAN note:** host and clients must share the same protocol version to play together. The app will prompt you to update when a new release is available.
          releaseDraft: false
          prerelease: false
          args: --bundles nsis
