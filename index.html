<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauy Smash Flash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #050505;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }
    #menu {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      justify-content: center;
      z-index: 10;
      background: rgba(5,5,5,0.92);
    }
    h1 { font-size: 2rem; color: #eee; margin-bottom: 8px; letter-spacing: 2px; }
    input {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #eee;
      font-size: 1rem;
      width: 240px;
    }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      width: 240px;
      font-weight: 600;
      transition: background 0.15s;
    }
    button:hover { background: #2563eb; }
    #game-container {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 0.85rem;
      color: #aaa;
      z-index: 5;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
  <div id="menu">
    <h1>BEAUY SMASH FLASH</h1>
    <button id="btn-host">Host Game</button>
    <input id="join-ip" type="text" value="127.0.0.1" placeholder="Host IP" />
    <button id="btn-join">Join Game</button>
  </div>
  <div id="hud">WASD to move</div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
