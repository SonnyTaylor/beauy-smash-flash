<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauy Smash Flash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    #menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    input {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      font-size: 1rem;
      width: 220px;
    }
    button {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      width: 220px;
    }
    button:hover { background: #2563eb; }
    canvas {
      border: 2px solid #333;
      border-radius: 8px;
      background: #0a0a0a;
      display: none;
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 0.85rem;
      color: #aaa;
      display: none;
    }
  </style>
</head>
<body>
  <div id="menu">
    <h1>Beauy Smash Flash</h1>
    <button id="btn-host">Host Game</button>
    <input id="join-ip" type="text" value="127.0.0.1" placeholder="Host IP" />
    <button id="btn-join">Join Game</button>
  </div>
  <div id="hud">WASD to move</div>
  <canvas id="game" width="800" height="600"></canvas>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
